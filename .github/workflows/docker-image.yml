---
name: Build & Push bridgepay-refund Image (ECR)

on:
  push:
    branches: ["deploy"]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-southeast-3
      ECR_REGISTRY: 307581778632.dkr.ecr.ap-southeast-3.amazonaws.com
      ECR_REPOSITORY: bridgepay/refund

    steps:
      - name: Checkout repository (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags (ensure tag discovery works)
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags

      - name: Determine release tag for this commit
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # Find a v* tag that points exactly at HEAD. This enforces your manual release tagging discipline.
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+' | head -n 1 || true)

          if [ -z "$TAG" ]; then
            echo "ERROR: No release tag (v*) points at this commit (HEAD)."
            echo "Create and push a tag (e.g., v2.7.14) on the intended commit, then fast-forward the deploy branch to that tag."
            exit 1
          fi

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

          echo "Release tag: ${TAG}"
          echo "Image URI: ${IMAGE_URI}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show pushed image digest
        shell: bash
        run: |
          set -euo pipefail
          echo "Pushed digest: ${{ steps.build-and-push.outputs.digest }}"
---
